<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Food - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .menu-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-radius: 12px;
            overflow: hidden;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
        .card-img-top {
            object-fit: cover;
            height: 250px;
        }
        .btn-custom {
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand text-danger fs-1 d-flex align-items-center" href="index.html">
                <img src="images ff/fast ff.avif" alt="Fast" height="110" class="me-2">
                <span style="font-family: 'Friz Quadrata', 'FrizQuadrata', serif; font-weight: 900; font-style: italic;">Food</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fs-5">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5 fw-bold" style="font-family: 'Friz Quadrata', 'FrizQuadrata', serif;">Our Menu Categories</h2>
            <div class="row">
                
                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm border-0 menu-card">
                        <img src="images ff/fast food ff.jpg" class="card-img-top" alt="Fast Foods">
                        <div class="card-body d-flex flex-column justify-content-center p-4">
                            <h3 class="card-title text-danger mb-4 fw-bold">Fast Foods</h3>
                            <a href="menu.html" class="btn btn-danger mt-auto stretched-link btn-custom">View Foods</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm border-0 menu-card">
                        <img src="images ff/drinks ff.jpg" class="card-img-top" alt="Drinks">
                        <div class="card-body d-flex flex-column justify-content-center p-4">
                            <h3 class="card-title text-danger mb-4 fw-bold">Drinks</h3>
                            <a href="menu.html" class="btn btn-danger mt-auto stretched-link btn-custom">View Drinks</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm border-0 menu-card">
                        <img src="images ff/desserts ff.jpg" class="card-img-top" alt="Desserts">
                        <div class="card-body d-flex flex-column justify-content-center p-4">
                            <h3 class="card-title text-danger mb-4 fw-bold">Desserts</h3>
                            <a href="menu.html" class="btn btn-danger mt-auto stretched-link btn-custom">View Desserts</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="bg-dark text-light py-4 text-center">
        <div class="container">
            <p class="mb-2">Fast Food Project Demo | 123 Street Wise Lane, Taiwan | +123 122 133 144</p>
            <p class="mb-0">
                <a href="index.html" class="text-warning text-decoration-none mx-2">Home</a> |
                <a href="menu.html" class="text-warning text-decoration-none mx-2">Menu</a> |
                <a href="contact.html" class="text-warning text-decoration-none mx-2">Contact</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
